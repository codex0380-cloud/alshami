      ]
    };
    const COUPONS = {
      'SHAMI20': { type: 'percent', value: 20, minOrder: 0, label: 'خصم 20% على أول طلب' },
      'SHAMI10': { type: 'percent', value: 10, minOrder: 100, label: 'خصم 10% على الطلبات فوق 100 ج.م' },
    };

    async function seedData() {
      const btn = document.getElementById('seedBtn');
      const status = document.getElementById('status');
      btn.disabled = true;
      btn.textContent = '⏳ جاري الرفع...';

      const log = (msg, type = 'info') => {
        status.innerHTML += `<div class="step ${type}">${msg}</div>`;
      };

      try {
        const menuObj = {};
        MEALS.forEach(m => menuObj[m.id] = m);
        const catObj = {};
        CATEGORIES.forEach(c => catObj[c.id] = c);

        log('📦 رفع الأقسام...');
        await db.ref('categories').set(catObj);
        log('✅ تم رفع الأقسام', 'success');

        log('📦 رفع المنيو...');
        await db.ref('menu').set(menuObj);
        log('✅ تم رفع ${MEALS.length} صنف', 'success');

        log('📦 رفع الإعدادات...');
        await db.ref('settings').set(DEFAULT_SETTINGS);
        log('✅ تم رفع الإعدادات (مناطق التوصيل، حالة المطعم)', 'success');

        log('📦 رفع الكوبونات...');
        await db.ref('coupons').set(COUPONS);
        log('✅ تم رفع الكوبونات (SHAMI20, SHAMI10)', 'success');

        log('🎉 تم تهيئة كل البيانات بنجاح!', 'success');
        btn.textContent = '✅ تم';
        status.innerHTML += '<div style="margin-top:1rem"><a href="admin.html" style="color:#D4AF37;font-weight:700">🔐 الذهاب للوحة الإدارة</a></div>';
      } catch (err) {
        log('❌ فشل: ' + err.message, 'error');
        if (err.message && err.message.includes('permission_denied')) {
          log('⚠️ قواعد Firebase مش بتسمح بالكتابة. روح لـ Firebase Console > Realtime Database > Rules واكتب: .write = true مؤقتاً', 'error');
          log('📋 أو أضف مستخدم في Firebase Console > Authentication > Users (admin@alshami.com) وسجل دخول في admin.html أولاً', 'error');
        }
        btn.disabled = false;
        btn.textContent = '🔁 حاول مرة أخرى';
      }
